<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>UnmarkAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="12" fill="rgba(45,212,191,0.07)" stroke="rgba(45,212,191,0.18)" stroke-width="1"/>
        <path d="M14 3.5L15.4 12.6L24 14L15.4 15.4L14 24.5L12.6 15.4L4 14L12.6 12.6Z" fill="#2DD4BF"/>
        <circle cx="14" cy="14" r="2" fill="white" opacity="0.55"/>
      </svg>
      <div class="brand-copy">
        <span class="brand-name">UnmarkAI</span>
        <span class="brand-sub" id="statusLabel">Active on Gemini</span>
      </div>
    </div>
    <div class="header-right">
      <span class="pip" id="statusDot"></span>
      <label class="master-sw" title="Enable / disable extension">
        <input type="checkbox" id="enabledCheckbox"/>
        <span class="ms-rail"><span class="ms-thumb"></span></span>
      </label>
    </div>
  </header>

  <!-- ── Stats ── -->
  <div class="stats">
    <div class="stat">
      <span class="stat-n" id="statTotal">0</span>
      <span class="stat-l">total cleaned</span>
    </div>
    <span class="stat-div"></span>
    <div class="stat">
      <span class="stat-n" id="statSession">0</span>
      <span class="stat-l">this session</span>
    </div>
  </div>

  <!-- ── Method ── -->
  <section class="method-section" id="methodSection">
    <div class="section-label">Cleaning method</div>
    <div class="method-pills">
      <button class="method-pill" data-method="smart" id="pillSmart">
        <div class="pill-icon-wrap">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M6.5 1L7.5 5.5L12 6.5L7.5 7.5L6.5 12L5.5 7.5L1 6.5L5.5 5.5Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="pill-text">
          <span class="pill-name">Smart</span>
          <span class="pill-desc">Fast · No download</span>
        </div>
      </button>
      <button class="method-pill" data-method="ai" id="pillAi">
        <div class="pill-icon-wrap">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M6.5 0.5L7.9 4.6L12 6.5L7.9 8.4L6.5 12.5L5.1 8.4L1 6.5L5.1 4.6Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="pill-text">
          <span class="pill-name">Advance</span>
          <span class="pill-desc">AI · Best quality</span>
        </div>
        <span class="pill-badge" id="pillAiBadge" style="display:none"></span>
      </button>
    </div>

    <!-- AI model status — shown when Advance is active -->
    <div class="model-status" id="modelStatus" style="display:none">
      <div id="modelStatusInner"></div>
    </div>
  </section>

  <!-- ── Settings ── -->
  <section class="settings-section" id="settingsSection">
    <div class="toggle-row">
      <div class="toggle-info">
        <span class="toggle-label">Auto-clean on download</span>
        <span class="toggle-sub" id="autoCleanSub">Removes watermarks automatically when you click ↓ in Gemini</span>
      </div>
      <label class="sw">
        <input type="checkbox" id="autoCleanCheckbox"/>
        <span class="sw-rail"><span class="sw-thumb"></span></span>
      </label>
    </div>
  </section>

  <!-- ── Scan ── -->
  <section class="scan" id="scanSection">
    <div class="scan-row">
      <div class="scan-hint-wrap">
        <span class="scan-hint" id="scanHint">Open a Gemini page to scan for images</span>
      </div>
      <div class="scan-actions">
        <button class="btn-ghost" id="dlAllBtn" style="display:none">Clean all</button>
        <button class="btn-primary" id="scanBtn">Scan page</button>
      </div>
    </div>
    <!-- Model downloading notice — shown in scan area when model is busy -->
    <div class="dl-notice" id="dlNotice" style="display:none">
      <div class="dl-notice-bar" id="dlNoticeBar"></div>
      <span class="dl-notice-text" id="dlNoticeText"></span>
    </div>
    <div class="img-grid" id="imageGrid" style="display:none"></div>
  </section>

  <!-- ── Footer ── -->
  <footer class="footer">
    <button class="lnk-btn" id="resetBtn">Reset stats</button>
    <span class="ver">v4.0.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
