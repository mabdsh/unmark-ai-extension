<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>UnmarkAI</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <!-- ── Header ───────────────────────────────────────────────────── -->
  <header class="header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L13.2 9.8L21 11L13.2 12.2L12 20L10.8 12.2L3 11L10.8 9.8Z" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">UnmarkAI</span>
        <span class="brand-sub" id="statusLabel">Watermark remover</span>
      </div>
    </div>
    <label class="switch" title="Enable extension">
      <input type="checkbox" id="enabledCheckbox"/>
      <span class="switch-rail"><span class="switch-thumb"></span></span>
    </label>
    <!-- statusDot kept for popup.js compat (off-screen, not visually used) -->
    <span class="sr-only" id="statusDot"></span>
  </header>

  <!-- ── Stats ────────────────────────────────────────────────────── -->
  <section class="stats">
    <div class="stat">
      <span class="stat-num" id="statTotal">0</span>
      <span class="stat-label">All time</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statSession">0</span>
      <span class="stat-label">Session</span>
    </div>
  </section>

  <!-- ── Engine selector ──────────────────────────────────────────── -->
  <section class="block" id="methodSection">
    <div class="block-label">Engine</div>
    <div class="engine-grid">

      <button class="engine-card method-pill" data-method="smart" id="pillSmart">
        <div class="engine-icon">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none">
            <path d="M9 1L2 9h5l-1 6 7-8H8l1-6z" fill="currentColor"/>
          </svg>
        </div>
        <div class="engine-meta">
          <span class="engine-name">Quick</span>
          <span class="engine-desc">Algorithmic · Instant</span>
        </div>
      </button>

      <button class="engine-card method-pill" data-method="ai" id="pillAi">
        <div class="engine-icon">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="none">
            <path d="M8 1L9.4 6.6L15 8L9.4 9.4L8 15L6.6 9.4L1 8L6.6 6.6Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="engine-meta">
          <span class="engine-name">Pro</span>
          <span class="engine-desc">AI model · Best quality</span>
        </div>
        <span class="engine-badge" id="pillAiBadge" hidden></span>
      </button>

    </div>

    <!-- Model status — shown only when Pro is active -->
    <div class="model-status" id="modelStatus" hidden>
      <div id="modelStatusInner"></div>
    </div>
  </section>

  <!-- ── Auto-clean ───────────────────────────────────────────────── -->
  <section class="block">
    <div class="row">
      <div class="row-meta">
        <span class="row-title">Auto-clean</span>
        <span class="row-desc" id="autoCleanSub">Clean automatically when you save from Gemini</span>
      </div>
      <label class="switch switch-sm">
        <input type="checkbox" id="autoCleanCheckbox"/>
        <span class="switch-rail"><span class="switch-thumb"></span></span>
      </label>
    </div>
  </section>

  <!-- ── Scan / images ────────────────────────────────────────────── -->
  <section class="block scan-block" id="scanSection">
    <div class="scan-head">
      <span class="scan-status" id="scanHint">Scan a Gemini page for images</span>
      <div class="scan-actions">
        <button class="btn btn-ghost" id="dlAllBtn" hidden>Clean all</button>
        <button class="btn btn-primary" id="scanBtn">Scan</button>
      </div>
    </div>

    <!-- Inline downloading notice — appears while model is busy -->
    <div class="dl-notice" id="dlNotice" hidden>
      <div class="dl-notice-bar" id="dlNoticeBar"></div>
      <span class="dl-notice-text" id="dlNoticeText"></span>
    </div>

    <div class="img-grid" id="imageGrid" hidden></div>
  </section>

  <!-- ── Footer ───────────────────────────────────────────────────── -->
  <footer class="footer">
    <button class="footer-link" id="resetBtn">Reset stats</button>
    <a class="footer-link" id="privacyLink"
       href="https://github.com/mabdsh/lama_fp32/blob/main/PRIVACY.md"
       target="_blank" rel="noopener">Privacy</a>
    <span class="footer-version">v4.0.9</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
