<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>UnmarkAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="14" r="12" fill="rgba(45,212,191,0.07)" stroke="rgba(45,212,191,0.18)" stroke-width="1"/>
        <path d="M14 3.5L15.4 12.6L24 14L15.4 15.4L14 24.5L12.6 15.4L4 14L12.6 12.6Z"
              fill="#2DD4BF"/>
        <circle cx="14" cy="14" r="2" fill="white" opacity="0.55"/>
      </svg>
      <div class="brand-copy">
        <span class="brand-name">UnmarkAI</span>
        <span class="brand-sub" id="statusLabel">Active on Gemini</span>
      </div>
    </div>
    <div class="header-right">
      <span class="pip" id="statusDot"></span>
      <label class="master-sw" title="Enable / disable">
        <input type="checkbox" id="enabledCheckbox"/>
        <span class="ms-rail"><span class="ms-thumb"></span></span>
      </label>
    </div>
  </header>

  <!-- ── Stats ── -->
  <div class="stats">
    <div class="stat">
      <span class="stat-n" id="statTotal">0</span>
      <span class="stat-l">cleaned total</span>
    </div>
    <span class="stat-div"></span>
    <div class="stat">
      <span class="stat-n" id="statSession">0</span>
      <span class="stat-l">this session</span>
    </div>
  </div>

  <!-- ── Scan ── -->
  <section class="scan">
    <div class="scan-row">
      <span class="scan-hint" id="scanHint">Open a Gemini page to scan</span>
      <div class="scan-actions">
        <button class="btn-ghost" id="dlAllBtn" style="display:none">Clean all</button>
        <button class="btn-primary" id="scanBtn">Scan page</button>
      </div>
    </div>
    <div class="img-grid" id="imageGrid" style="display:none"></div>
  </section>

  <!-- ── Settings ── -->
  <div class="settings">

    <div class="cfg-row">
      <span class="cfg-label">Method</span>
      <div class="seg-ctrl" id="methodGrid">
        <button class="seg" data-method="smart">Smart</button>
        <button class="seg" data-method="fill">Fill</button>
        <button class="seg" data-method="crop">Crop</button>
        <button class="seg" data-method="strip">Strip</button>
      </div>
    </div>

    <div class="cfg-row">
      <span class="cfg-label">Format</span>
      <div class="seg-ctrl">
        <button class="seg format-seg" data-format="png">PNG</button>
        <button class="seg format-seg" data-format="jpeg">JPEG</button>
      </div>
    </div>

    <div class="quality-row" id="qualityRow" style="display:none">
      <span class="cfg-label">Quality</span>
      <div class="quality-ctrl">
        <input type="range" class="q-range" id="qualitySlider"
               min="50" max="99" step="1" value="96" aria-label="JPEG quality">
        <span class="quality-val" id="qualityValue">96%</span>
      </div>
    </div>

    <div class="rule"></div>

    <div class="toggle-row">
      <span class="toggle-label">Remove sparkle watermark</span>
      <label class="sw"><input type="checkbox" id="removeVisibleCheckbox">
        <span class="sw-rail"><span class="sw-thumb"></span></span></label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Strip SynthID fingerprint</span>
      <label class="sw"><input type="checkbox" id="removeSynthIDCheckbox">
        <span class="sw-rail"><span class="sw-thumb"></span></span></label>
    </div>
    <div class="toggle-row last">
      <span class="toggle-label">Page notifications</span>
      <label class="sw"><input type="checkbox" id="notifCheckbox">
        <span class="sw-rail"><span class="sw-thumb"></span></span></label>
    </div>

  </div>

  <!-- ── Footer ── -->
  <footer class="footer">
    <button class="lnk-btn" id="resetBtn">Reset stats</button>
    <span class="ver">v3.7.0</span>
  </footer>

  <input type="radio" name="format" value="png"  id="formatPng"  style="display:none">
  <input type="radio" name="format" value="jpeg" id="formatJpeg" style="display:none">

  <script src="popup.js"></script>
</body>
</html>
