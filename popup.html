<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gemini Watermark Remover</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="18,2 32,10 32,26 18,34 4,26 4,10" fill="url(#g1)" opacity="0.14" stroke="url(#g1)" stroke-width="1.5"/>
        <line x1="18" y1="10" x2="18" y2="26" stroke="url(#g1)" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="10" y1="18" x2="26" y2="18" stroke="url(#g1)" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="12" y1="12" x2="24" y2="24" stroke="url(#g1)" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
        <line x1="24" y1="12" x2="12" y2="24" stroke="url(#g1)" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>
        <defs>
          <linearGradient id="g1" x1="4" y1="2" x2="32" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#A78BFA"/>
            <stop offset="100%" stop-color="#6366F1"/>
          </linearGradient>
        </defs>
      </svg>
      <div class="logo-text">
        <span class="logo-title">Watermark Remover</span>
        <span class="logo-sub">Gemini &amp; AI Studio · v3.2</span>
      </div>
    </div>
    <label class="toggle" title="Enable / Disable">
      <input type="checkbox" id="enabledCheckbox"/>
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
    </label>
  </header>

  <!-- ── Status bar ── -->
  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span class="status-label" id="statusLabel">Active</span>
  </div>

  <!-- ── Stats ── -->
  <section class="stats-row">
    <div class="stat-card">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Total Removed</span>
    </div>
    <div class="stat-divider"></div>
    <div class="stat-card">
      <span class="stat-value" id="statSession">0</span>
      <span class="stat-label">This Session</span>
    </div>
  </section>

  <!-- ── Manual Scan ── -->
  <section class="section scan-section">
    <div class="section-header">
      <div class="section-title">Manual — Scan Page Images</div>
      <button class="scan-btn" id="scanBtn">Scan</button>
    </div>
    <div class="scan-hint" id="scanHint">Click "Scan" to find images on the current Gemini page</div>
    <div class="image-grid" id="imageGrid" style="display:none;"></div>
  </section>

  <!-- ── Settings ── -->
  <section class="section">
    <div class="section-title">Watermark Removal</div>
    <label class="row-item">
      <div class="row-label">
        <span class="row-name">Remove Visible Watermark</span>
        <span class="row-desc">Detects and erases "✦ Made with Gemini" mark</span>
      </div>
      <label class="toggle sm">
        <input type="checkbox" id="removeVisibleCheckbox"/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </label>
    <label class="row-item">
      <div class="row-label">
        <span class="row-name">Strip SynthID (Invisible)</span>
        <span class="row-desc">Canvas re-encode destroys pixel-level mark</span>
      </div>
      <label class="toggle sm">
        <input type="checkbox" id="removeSynthIDCheckbox"/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </label>
  </section>

  <!-- ── Method ── -->
  <section class="section">
    <div class="section-title">Removal Method</div>
    <div class="method-grid" id="methodGrid">
      <button class="method-btn" data-method="smart">
        <span class="method-icon">✦</span>
        <span class="method-name">Smart</span>
        <span class="method-desc">Blend fill · recommended</span>
      </button>
      <button class="method-btn" data-method="fill">
        <span class="method-icon">▦</span>
        <span class="method-name">Fill</span>
        <span class="method-desc">Copy pixels above</span>
      </button>
      <button class="method-btn" data-method="crop">
        <span class="method-icon">✂</span>
        <span class="method-name">Crop</span>
        <span class="method-desc">Trim image bottom</span>
      </button>
      <button class="method-btn" data-method="strip">
        <span class="method-icon">⟳</span>
        <span class="method-name">Re-encode</span>
        <span class="method-desc">SynthID only</span>
      </button>
    </div>
  </section>

  <!-- ── Format ── -->
  <section class="section">
    <div class="section-title">Output Format</div>
    <div class="format-row">
      <label class="format-opt">
        <input type="radio" name="format" value="png" id="formatPng"/>
        <span class="format-label">PNG <em>Lossless</em></span>
      </label>
      <label class="format-opt">
        <input type="radio" name="format" value="jpeg" id="formatJpeg"/>
        <span class="format-label">JPEG <em>Smaller</em></span>
      </label>
    </div>
  </section>

  <!-- ── Notifications ── -->
  <section class="section">
    <label class="row-item last">
      <div class="row-label">
        <span class="row-name">Toast Notifications</span>
        <span class="row-desc">Show processing status on page</span>
      </div>
      <label class="toggle sm">
        <input type="checkbox" id="notifCheckbox"/>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
    </label>
  </section>

  <!-- ── Footer ── -->
  <footer class="footer">
    <button class="reset-btn" id="resetBtn">Reset Stats</button>
    <span class="version">v3.2.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
